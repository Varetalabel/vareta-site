<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - VARETA</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: black;
}

nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

.products {
  padding: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  text-align: center;
}

.card img {
  width: 100%;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h2>VARETA</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<section class="products">
  <h2>All Products</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
      <p>Oversized Tee</p>
      <p>$39</p>
      <button onclick="addToCart('Oversized Tee',39)">Add to Cart</button>    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <p>Street Hoodie</p>
      <p>$69</p>
      <button onclick="addToCart('Street Hoodie',69)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
      <p>Minimal Jacket</p>
      <p>$89</p>
      <button onclick="addToCart('Minimal Jacket',89)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
      <p>Cargo Pants</p>
      <p>$59</p>
     <button onclick="addToCart('Cargo Pants',59)">Add to Cart</button>
    </div>

  </div>
</section>

</body>
</html>
